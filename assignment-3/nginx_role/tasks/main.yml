---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Change Nginx port to 9090
  replace:
    path: /etc/nginx/sites-available/default
    regexp: 'listen 80 default_server;'
    replace: 'listen 9090 default_server;'

- name: Change IPv6 port to 9090
  replace:
    path: /etc/nginx/sites-available/default
    regexp: 'listen \[::\]:80 default_server;'
    replace: 'listen [::]:9090 default_server;'

- name: Check Nginx config
  command: nginx -t

- name: Restart Nginx
  service:
    name: nginx
    state: restarted
    enabled: yes
